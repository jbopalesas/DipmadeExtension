name: Publish NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extraire la version depuis le tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore DipmadeExtension/DipmadeExtension.csproj

      - name: Build
        run: dotnet build DipmadeExtension/DipmadeExtension.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test DipmadeExtension/DipmadeExtension.csproj --configuration Release --no-restore
            
      - name: Pack NuGet
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          New-Item -ItemType Directory -Force -Path nupkg | Out-Null
          nuget pack DipmadeExtension.nuspec -Version $version -OutputDirectory nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
